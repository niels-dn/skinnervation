<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Index of Cutaneous Innervation</title>
<link rel="stylesheet" href="css/skin.css"/>
  <link rel="icon" href="favicon.ico" sizes="any"/>
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32x32.png"/>
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png"/>
  <meta name="theme-color" content="#f4f1ec"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #f4f1ec;
    --panel:  #eae6de;
    --border: #c8bfb0;
    --text:   #2a2318;
    --muted:  #7a6f62;
    --hover:  #ddd7cd;
    --c-root:     #8b1a1a;
    --c-ramus:    #7a4500;
    --c-plexus:   #2c4a7a;
    --c-trunk:    #1a5c3a;
    --c-nerve:    #3a3a8a;
    --c-branch:   #5a3070;
    --c-terminal: #5a4500;
  }

  html { height:100%; scrollbar-gutter:stable; }
  body { display:flex; flex-direction:column; height:100vh; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Source Code Pro',monospace; }
  #app { display:flex; flex-direction:column; flex:1; min-height:0; position:relative; }

  /* HEADER */
  header {
    flex-shrink:0; padding:6px 18px 4px;
    background:var(--panel); border-bottom:1.5px solid var(--border);
    display:flex; flex-direction:column; gap:0;
  }
  .header-row {
    display:flex; flex-direction:column; gap:0;
  }
  .header-titles { display:flex; flex-direction:column; gap:1px; }
  header h1       { font-family:'Libre Baskerville',serif; font-size:.95rem; font-weight:700; color:var(--text); margin:0; }
  header .subtitle { font-family:'Libre Baskerville',serif; font-size:.80rem; font-weight:700; font-style:italic; color:var(--text); margin:0; }
  header p         { font-size:.66rem; color:var(--muted); font-style:italic; margin:0; }
  .legend   { display:flex; gap:6px; flex-wrap:wrap; padding:6px 0 10px 0; }
  .leg      { display:flex; align-items:center; gap:5px; font-size:.63rem; color:var(--muted); }
  .leg-dot  { width:10px; height:10px; border-radius:2px; flex-shrink:0; }

  /* TOOLBAR */
  #toolbar {
    flex-shrink:0; padding:0;
    background:var(--panel); border-bottom:none;
    display:flex; flex-direction:column;
  }
  .tb-top {
    display:flex; align-items:center; gap:6px; flex-wrap:nowrap;
    padding:10px 18px 6px; overflow-x:auto; -webkit-overflow-scrolling:touch;
    scrollbar-width:none;
  }
  .tb-top::-webkit-scrollbar { display:none; }
  .tb-bottom {
    display:flex; align-items:center; gap:8px;
    padding:0 18px 8px;
    border-bottom:1px solid var(--border);
  }
  .fb-label { font-size:.63rem; color:var(--muted); margin-right:2px; }
  .fb {
    padding:4px 12px; border-radius:3px;
    border:1.5px solid var(--border); background:transparent;
    color:var(--muted); font-family:'Libre Baskerville',serif; font-size:.63rem;
    cursor:pointer; transition:background .15s, color .15s, border-color .15s, box-shadow .15s;
    white-space:nowrap;
  }
  .fb:hover {
    background:var(--hover); color:var(--text);
    border-color:#9a9080;
  }
  .fb.on {
    background:#5a3a1a; border-color:#5a3a1a; color:#fff;
  }
  #search-wrap { position:relative; display:flex; align-items:center; flex:1; }
  #search-wrap::before {
    content:'⌕'; position:absolute; left:9px;
    font-size:.80rem; color:#9a9080; pointer-events:none; line-height:1;
  }
  #search {
    padding:4px 10px 4px 26px; border-radius:3px;
    border:1px solid var(--border); background:#fff;
    color:var(--text); font-family:'Libre Baskerville',serif; font-size:.63rem;
    width:200px; outline:none; transition:border-color .15s, box-shadow .15s;
  }
  #search:focus {
    border-color:#9a9080;
  }
  #search::placeholder { color:#b0a898; }
  #search-clear {
    position:absolute; right:9px; cursor:pointer;
    font-size:.75rem; color:#9a9080; display:none; line-height:1;
    background:none; border:none; padding:0;
  }
  #search-clear:hover { color:var(--text); }
  #search-dropdown {
    position:absolute; top:calc(100% + 5px); left:0; right:0;
    background:#fff; border:1px solid #9a9080; border-radius:3px;
    box-shadow:0 3px 10px rgba(0,0,0,.10); z-index:999;
    max-height:320px; overflow-y:auto; display:none;
  }
  #search-dropdown.open { display:block; }
  .sd-item {
    padding:7px 14px; cursor:pointer;
    font-family:'Libre Baskerville',serif; font-size:.68rem; color:var(--text);
    border-bottom:1px solid #f0ece5; line-height:1.4;
  }
  .sd-item:last-child { border-bottom:none; }
  .sd-item:hover, .sd-item.active { background:#f4efe8; }
  .sd-item .sd-idx  { font-size:.58rem; color:var(--muted); margin-left:6px; }
  .sd-item .sd-type { font-size:.58rem; color:#9a9080; float:right; }
  #sd-empty {
    padding:10px 14px; font-size:.65rem; color:var(--muted);
    font-style:italic; text-align:center;
  }

  /* GRAPH */
  #graph { flex:1; overflow:hidden; position:relative; cursor:grab; }
  #anat-view:not(.active) { display:none !important; }
  #graph:active { cursor:grabbing; }
  svg { width:100%; height:100%; }

  /* Links: default visible; highlighted; hidden by filter */
  .link          { fill:none; stroke-opacity:.30; stroke-width:1.2px; }
  .link.hl       { stroke-opacity:.95 !important; stroke-width:2.6px !important; }
  .link.variable { stroke-dasharray:5,4; stroke-opacity:.45 !important; }
  .link.variable.hl { stroke-dasharray:5,4; stroke-opacity:.75 !important; }
  .link.dim      { stroke-opacity:.06 !important; }  /* used only by search */
  .link.hidden { display:none; }

  /* Nodes */
  .node         { cursor:pointer; }
  .node.hl       rect { stroke-width:2px !important; }
  .node.hl       text { font-weight:600 !important; }
  .node.dim      rect { opacity:.08; }
  .node.dim      text { opacity:.06; }
  .node.variable rect { stroke-dasharray:5,3 !important; stroke-opacity:.50 !important; }
  .node.variable text { opacity:.55 !important; }
  .node.hidden   { display:none; }

  /* ── MOBILE RESPONSIVE ────────────────────────────────────────────────── */
  /* Mobile list view */

  @media (max-width: 700px) {
    #app { overflow:hidden; }
    .tb-top { padding:8px 12px 5px; }
    .tb-bottom { padding:0 12px 7px; }
    #legend-row { padding:5px 12px 9px; }
    .fb { padding:4px 9px; font-size:.60rem; }
    .fb-label { display:none; }
  }

  /* ANATOMIC VIEW */
  #anat-view {
    display:none; flex:1; position:relative; overflow:hidden;
    background:var(--bg);
  }
  #anat-view.active { display:flex; }
  #anat-svg {
    width:100%; height:100%;
  }
  .anat-node {
    cursor:pointer;
  }
  .anat-node.anat-active rect {
    fill-opacity:0.45 !important; stroke-width:3.5 !important;
  }
  .anat-node circle {
    fill:#7a4a00; fill-opacity:.85; stroke:#fff; stroke-width:1.2;
    transition:fill .15s, r .15s;
  }
  .anat-node:hover circle { fill:#5a3a00; r:7; }
  .anat-node text {
    font-family:'Libre Baskerville',serif;
    pointer-events:none;
  }
  .anat-label-bg {
    fill:#faf7f2; fill-opacity:.88; rx:2;
  }
  .anat-silhouette { fill:#e8e0d5; stroke:#c8bfb0; stroke-width:1; }
  .anat-view-label {
    font-family:'Libre Baskerville',serif;
    font-style:italic;
  }
  #view-toggle {
    display:flex; gap:0; margin-left:8px;
  }
  .vt-btn {
    padding:3px 10px; border:1px solid var(--border);
    background:transparent; color:var(--muted);
    font-family:'Libre Baskerville',serif; font-size:.60rem;
    cursor:pointer; transition:background .13s;
  }
  .vt-btn:first-child { border-radius:3px 0 0 3px; }
  .vt-btn:last-child  { border-radius:0 3px 3px 0; border-left:none; }
  .vt-btn.on { background:#5a3a1a; border-color:#5a3a1a; color:#fff; }
  .vt-btn:hover:not(.on) { background:var(--hover); color:var(--text); }

  /* NODE HOVER TOOLTIP */
  #node-tooltip {
    position:fixed; z-index:500; pointer-events:none;
    background:#faf7f2; border:1px solid #c8bfb0;
    padding:4px 10px; font-family:'Libre Baskerville',serif;
    font-size:.65rem; color:#2a2018; white-space:nowrap;
    display:none; box-shadow:0 2px 8px rgba(0,0,0,.10);
  }

  /* INFO BUTTON — links to guide */
  #btn-info {
    position:fixed; bottom:14px; right:18px; z-index:100;
    width:26px; height:26px; border-radius:3px;
    background:var(--panel); border:1px solid var(--border);
    color:var(--muted); font-size:.78rem; font-family:'Libre Baskerville',serif;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    text-decoration:none; line-height:1;
    transition:border-color .13s, color .13s;
  }
  #btn-info:hover { border-color:#9a9080; color:var(--text); }

  #legend-row {
    display:flex; align-items:center; gap:8px; flex-wrap:nowrap;
    padding:6px 18px 12px; background:var(--panel);
    border-bottom:1px solid var(--border); flex-shrink:0;
    overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none;
  }
  #legend-row::-webkit-scrollbar { display:none; }
  #legend-row.hidden { display:none !important; }

  /* INFO PANEL – static bar below toolbar */
  #tip {
    flex-shrink:0; position:relative;
    background:var(--panel); border-bottom:1px solid var(--border);
    font-size:.68rem; line-height:1.6; color:var(--text);
    overflow:hidden;
    max-height:0; padding:0 18px;
    transition:max-height .25s ease, padding .25s ease, flex .25s ease;
  }
  #tip.visible   { max-height:110px; padding:7px 18px; }

  #tip-inner   { display:flex; flex-direction:column; gap:2px; }
  #tip h3      { font-family:'Libre Baskerville',serif; font-size:.82rem; font-weight:700; color:var(--text); white-space:normal; margin:0 0 2px 0; }

  #tip .t-idx  { color:var(--muted); font-size:.61rem; white-space:nowrap; }
  #tip .t-path { color:#6a5f52; font-size:.64rem; }
  #tip .t-path b { color:var(--text); font-weight:500; }
  #tip-anat-btn {
    display:inline-flex; align-self:flex-end; margin-left:auto;
    margin-top:3px; padding:1px 8px;
    border-radius:3px; border:1px solid var(--border);
    background:transparent; color:var(--muted);
    font-family:'Libre Baskerville',serif; font-size:.60rem;
    cursor:pointer; transition:all .13s; line-height:1.6;
  }
  #tip-anat-btn:hover { background:var(--hover); color:var(--text); border-color:#9a9080; }

  /* ZOOM */
  #zoom-btns { position:absolute; bottom:12px; left:12px; display:flex; gap:3px; }
  .zb {
    width:26px; height:26px; border-radius:3px;
    background:var(--panel); border:1px solid var(--border);
    color:var(--muted); font-size:.9rem; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:all .13s;
  }
  .zb:hover { background:var(--hover); color:var(--text); }
  .hint { position:absolute; bottom:14px; left:100px; font-size:.6rem; color:#b0a898; }

  /* ── Info button ── */
  #info-btn {
    position: absolute; bottom: 14px; right: 14px; z-index: 10;
    width: 28px; height: 28px; border-radius: 3px;
    background: var(--panel); border: 1px solid var(--border);
    color: var(--muted); font-size: .82rem;
    font-family: 'Libre Baskerville', serif; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: border-color .13s, color .13s;
  }
  #info-btn:hover { border-color: #9a9080; color: var(--text); }

  /* ── Info splash ── */
  #info-splash {
    display: none; position: fixed; inset: 0; z-index: 9999;
    background: rgba(42,35,24,0.45);
    align-items: center; justify-content: center; padding: 24px;
  }
  #info-splash.visible { display: flex; }
  .info-splash-card {
    background: #faf3dc; border: 1.5px solid #e0c96a;
    border-radius: 4px; padding: 22px 20px 18px;
    max-width: 380px; width: 100%;
    display: flex; flex-direction: column; gap: 14px;
  }
  .info-splash-card h4 {
    font-family: 'Libre Baskerville', serif;
    font-size: .95rem; font-weight: 700; color: #5a4700; margin: 0;
  }
  .info-splash-card p {
    font-size: .85rem; color: #6b5800; line-height: 1.65;
    margin: 0; text-align: left;
  }
  .info-splash-ok {
    align-self: flex-end;
    padding: 5px 20px; border-radius: 3px;
    background: #c8a000; border: none; color: #fff;
    font-family: 'Libre Baskerville', serif; font-size: .85rem;
    cursor: pointer; transition: background .13s;
  }
  .info-splash-ok:hover { background: #a88600; }
</style>
</head>
<body>
<div id="app">

<div id="toolbar">
  <div class="tb-top">
    <span class="fb-label">Show:</span>
    <button class="fb" data-g="head">Head / Neck</button>
    <button class="fb on" data-g="arm">Upper limb</button>
    <button class="fb" data-g="truncus">Truncus</button>
    <button class="fb" data-g="lowerbody">Lower body</button>
  </div>
  <div class="tb-bottom">
    <div id="view-toggle">
      <button class="vt-btn on" id="vt-pathway">Pathway</button>
      <button class="vt-btn" id="vt-anatomic">Anatomic</button>
    </div>
    <div id="search-wrap">
      <input id="search" type="text" placeholder="Search nerve…" autocomplete="off"/>
      <button id="search-clear" title="Clear">✕</button>
      <div id="search-dropdown"></div>
    </div>
  </div>
  <div id="node-tooltip"></div>
</div>
<div id="legend-row">
  <span class="fb-label">Legend:</span>
  <div class="leg"><div class="leg-dot" style="background:#8b1a1a"></div>Root</div>
  <div class="leg"><div class="leg-dot" style="background:#1a6b5a"></div>Plexus</div>
  <div class="leg"><div class="leg-dot" style="background:#2c4a7a"></div>Connecting nerve</div>
  <div class="leg"><div class="leg-dot" style="background:#7a4a00"></div>Cutaneous innervation</div>
</div>

<div id="tip">
  <div id="tip-inner"></div>

</div>
<div id="anat-view"></div>

<div id="graph">
  <svg id="svg"></svg>
</div>
<div id="zoom-btns">
  <button class="zb" id="z-in">+</button>
  <button class="zb" id="z-out">−</button>
  <button class="zb" id="z-fit" title="Fit to screen">⊡</button>
</div>

<button id="info-btn" title="Anatomical variation">!</button>

<div id="info-splash">
  <div class="info-splash-card">
    <h4>Anatomical variation</h4>
    <p>Anatomical variation is inherent to human biology. The territories and
    pathways shown represent typical patterns and should be interpreted
    accordingly.</p>
    <button class="info-splash-ok"
      onclick="document.getElementById('info-splash').classList.remove('visible')">Ok</button>
  </div>
</div>

</div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
//  DATA MODEL
//  Groups: head | arm | truncus | lowerbody
// ═══════════════════════════════════════════════════════════════════════════
const TYPE = { root:'root', ramus:'ramus', plexus:'plexus', trunk:'trunk', nerve:'nerve', branch:'branch', terminal:'terminal' };
const HEX  = { root:'#8b1a1a', ramus:'#2c4a7a', plexus:'#1a6b5a', trunk:'#1a6b5a', nerve:'#2c4a7a', branch:'#2c4a7a', terminal:'#7a4a00' };

// Node dimensions – wider + taller to allow two-line labels
const NW=188, NH=40, COL_GAP=220, ROW_GAP=50, MX=48, MY=36;
// Characters that fit per line (approx 7.8 px / char at 7.8px font → ~24 chars in 188px)
const CHARS_PER_LINE = 24;

// ── Anatomic view coordinate space + node positions (module scope) ──────────
const VW = 1536, VH = 1024;
const NODE_POS = {
  // Anterior: image x=192, w=384, h=1024 (SVG 143×382, scale ×2.685)
  // Arm midline ≈ x=382, elbow ≈ y=530, wrist ≈ y=750
  't18_1': { x:260,  y:200  },   // N. cut. brachii medialis
  't13_2': { x:510,  y:150  },   // N. cut. brachii lat. sup.
  't13_3': { x:510,  y:390  },   // N. cut. brachii lat. inf.
  't17_1': { x:260,  y:600  },   // N. cut. antebrachii med.
  't11_1': { x:510,  y:620  },   // N. cut. antebrachii lat.
  't16_1': { x:260,  y:760  },   // R. palmaris n. ulnaris
  't14_1': { x:510,  y:800  },   // R. palmaris n. mediani
  't16_2': { x:260,  y:920  },   // Nn. dig. palm. prop. (ulnaris)
  't14_2': { x:510,  y:960  },   // Nn. dig. palm. prop. (medianus)
  // Posterior: image x=940, w=423, h=1024 (SVG 150×363, scale ×2.82)
  // Arm midline ≈ x=1152, elbow ≈ y=480, wrist ≈ y=700
  't10_1': { x:980,  y:140  },   // R. lat. r. post. C5
  't13_1': { x:1350, y:200  },   // N. cut. brachii post.
  't12_1': { x:980,  y:340  },   // R. lat. r. post. C6
  't15_1': { x:980,  y:530  },   // R. lat. r. post. C7
  't16_3': { x:980,  y:700  },   // R. dorsalis n. ulnaris
  't13_4': { x:1350, y:740  },   // R. superficialis n. radialis
};

const nodes = [];
const edges = [];

function N(id, label, type, group, idx) {
  idx = idx || '';
  nodes.push({ id, label, fullLabel: label, type, group, idx });
  return id;
}
function E(s, t) { edges.push({ s, t }); }

// ─── SPINAL NERVE ROOTS ────────────────────────────────────────────────────
// Head/neck
const CNV   = N('CNV',  'N. trigeminus (V)',  TYPE.root,'head');
const CNVII = N('CNVII','N. facialis (VII)',  TYPE.root,'head');
const CNX   = N('CNX',  'N. vagus (X)',        TYPE.root,'head');
const C2    = N('C2',   'N. spinalis C2', TYPE.root,'head');
const C3    = N('C3',   'N. spinalis C3', TYPE.root,'head');
const C4    = N('C4',   'N. spinalis C4', TYPE.root,'head');
// Upper limb
const C5    = N('C5',   'N. spinalis C5', TYPE.root,'arm');
const C6    = N('C6',   'N. spinalis C6', TYPE.root,'arm');
const C7    = N('C7',   'N. spinalis C7', TYPE.root,'arm');
const C8    = N('C8',   'N. spinalis C8', TYPE.root,'arm');
const T1    = N('T1',   'N. spinalis T1', TYPE.root,'arm');
// Truncus  (T2–T11)
const T2    = N('T2',   'N. spinalis T2',  TYPE.root,'truncus');
const T3    = N('T3',   'N. spinalis T3',  TYPE.root,'truncus');
const T4    = N('T4',   'N. spinalis T4',  TYPE.root,'truncus');
const T5    = N('T5',   'N. spinalis T5',  TYPE.root,'truncus');
const T6    = N('T6',   'N. spinalis T6',  TYPE.root,'truncus');
const T7    = N('T7',   'N. spinalis T7',  TYPE.root,'truncus');
const T8    = N('T8',   'N. spinalis T8',  TYPE.root,'truncus');
const T9    = N('T9',   'N. spinalis T9',  TYPE.root,'truncus');
const T10   = N('T10',  'N. spinalis T10', TYPE.root,'truncus');
const T11   = N('T11',  'N. spinalis T11', TYPE.root,'truncus');
// Lower body  (T12 and below)
const T12   = N('T12',  'N. spinalis T12', TYPE.root,'lowerbody');
const L1    = N('L1',   'N. spinalis L1',  TYPE.root,'lowerbody');
const L2    = N('L2',   'N. spinalis L2',  TYPE.root,'lowerbody');
const L3    = N('L3',   'N. spinalis L3',  TYPE.root,'lowerbody');
const L4    = N('L4',   'N. spinalis L4',  TYPE.root,'lowerbody');
const L5    = N('L5',   'N. spinalis L5',  TYPE.root,'lowerbody');
const S1    = N('S1',   'N. spinalis S1',  TYPE.root,'lowerbody');
const S2    = N('S2',   'N. spinalis S2',  TYPE.root,'lowerbody');
const S3    = N('S3',   'N. spinalis S3',  TYPE.root,'lowerbody');
const S4    = N('S4',   'N. spinalis S4',  TYPE.root,'lowerbody');
const S5    = N('S5',   'N. spinalis S5',  TYPE.root,'lowerbody');
const Co    = N('Co',   'N. spinalis Co',  TYPE.root,'lowerbody');

// ─── CN V ──────────────────────────────────────────────────────────────────
const V1=N('V1','N. ophthalmicus (V1)',TYPE.nerve,'head');
const V2=N('V2','N. maxillaris (V2)',  TYPE.nerve,'head');
const V3=N('V3','N. mandibularis (V3)',TYPE.nerve,'head');
E(CNV,V1); E(CNV,V2); E(CNV,V3);

const nFront=N('nFront','N. frontalis',   TYPE.nerve,'head');
const nNasoc=N('nNasoc','N. nasociliaris',TYPE.nerve,'head');
E(V1,nFront); E(V1,nNasoc);

const fwd={};
nodes.forEach(nd=>fwd[nd.id]=[]);
edges.forEach(({s,t})=>{if(fwd[s])fwd[s].push(t);});

// BFS for depth
const depthOf={};
const bfsQ=[];
nodes.filter(nd=>nd.type===TYPE.root).forEach(nd=>{depthOf[nd.id]=0;bfsQ.push(nd.id);});
while(bfsQ.length){
  const cur=bfsQ.shift();
  (fwd[cur]||[]).forEach(ch=>{if(depthOf[ch]===undefined){depthOf[ch]=depthOf[cur]+1;bfsQ.push(ch);}});
}
nodes.forEach(nd=>{if(depthOf[nd.id]===undefined)depthOf[nd.id]=0;});

// Force plexSP and plexSA to be at least 1 column deeper than trLumbSacr,
// so their edges don't visually cross over trLumbSacr.
(function(){
  const minDepth = (depthOf['trLumbSacr'] || 0) + 1;
  ['plexSP','plexSA'].forEach(id=>{
    if((depthOf[id]||0) < minDepth) depthOf[id] = minDepth;
  });
  // Propagate: any node downstream of plexSP/plexSA must also shift
  const shifted = new Set(['plexSP','plexSA']);
  const q = ['plexSP','plexSA'];
  while(q.length){
    const cur=q.shift();
    (fwd[cur]||[]).forEach(ch=>{
      const needed = depthOf[cur]+1;
      if(depthOf[ch] < needed){
        depthOf[ch]=needed;
        if(!shifted.has(ch)){ shifted.add(ch); q.push(ch); }
      }
    });
  }
})();

// Explicit anatomical rank for every node id.
// Nodes not listed fall back to 9999 (sorted last alphabetically within group).
const ANAT_RANK = (function(){
  const order = [
    // ── Cranial nerves ──────────────────────────────
    'CNV','CNVII','CNX',
    // ── Cervical ────────────────────────────────────
    'C2','C3','C4',               // head/neck
    'C5','C6','C7','C8',          // arm
    // ── Thoracic ────────────────────────────────────
    'T1',                          // arm
    'T2','T3','T4','T5','T6',
    'T7','T8','T9','T10','T11',   // truncus
    'T12',                         // lowerbody
    // ── Lumbar ──────────────────────────────────────
    'L1','L2','L3','L4','L5','L5ant',
    // ── Sacral / coccygeal ──────────────────────────
    'S1','S2','S3','S4','S5','Co',
  ];
  const m={};
  order.forEach((id,i)=>m[id]=i);
  return m;
})();

// Return the anatomical rank of a node.
// For non-root nodes: inherit from the earliest root ancestor.
function anatRank(nd){
  if(ANAT_RANK[nd.id]!==undefined) return ANAT_RANK[nd.id];
  // Walk up via bwd (built later) — not available yet, so use group order
  // as secondary; primary differentiation comes from roots in same column.
  return 9999;
}

// Sort comparator: group → anatomical root rank → TA term number → label
function colSort(a,b){
  const g=(GROUP_ORDER[a.group]??99)-(GROUP_ORDER[b.group]??99);
  if(g!==0) return g;
  const ra=ANAT_RANK[a.id]??9999, rb=ANAT_RANK[b.id]??9999;
  if(ra!==rb) return ra-rb;
  // Secondary: TA2/TNA term number (sorts branches within same nerve)
  const ta_a=TA_NUM[a.id]??9999, ta_b=TA_NUM[b.id]??9999;
  if(ta_a!==ta_b) return ta_a-ta_b;
  return a.label.localeCompare(b.label);
}

// ═══════════════════════════════════════════════════════════════════════════
//  TEXT WRAPPING HELPER
//  Splits a label into lines that fit within NW, respecting existing \n
// ═══════════════════════════════════════════════════════════════════════════
function wrapLabel(label) {
  // label may already have \n breaks inserted in the data
  // Split by existing newlines first, then word-wrap each segment
  const existingLines = label.split('\n');
  const result = [];
  existingLines.forEach(seg => {
    const words = seg.split(' ');
    let line = '';
    words.forEach(w => {
      const candidate = line ? line + ' ' + w : w;
      if (candidate.length > CHARS_PER_LINE && line) {
        result.push(line);
        line = w;
      } else {
        line = candidate;
      }
    });
    if (line) result.push(line);
  });
  return result;
}

// ═══════════════════════════════════════════════════════════════════════════
//  HIGHLIGHT – strict directional BFS: only the exact path to/from chosen node
// ═══════════════════════════════════════════════════════════════════════════
// Build backward adjacency (child → parents)
const bwd={};
nodes.forEach(nd=>bwd[nd.id]=[]);
edges.forEach(({s,t})=>{if(bwd[t])bwd[t].push(s);});

// ── Propagate anatomical rank to non-root nodes via BFS upstream ──────────
// Each node gets the *minimum* root rank reachable from it, so that
// descendants of CNV sort before descendants of C2, etc.
(function(){
  // Start with nodes that already have an explicit rank
  const queue = nodes.filter(nd => ANAT_RANK[nd.id] !== undefined).map(nd => nd.id);
  // Spread rank downstream (fwd direction) with minimum semantics
  const visited = new Set(queue);
  while(queue.length){
    const cur = queue.shift();
    const curRank = ANAT_RANK[cur] ?? 9999;
    (fwd[cur]||[]).forEach(child => {
      const childRank = ANAT_RANK[child] ?? 9999;
      if(curRank < childRank){
        ANAT_RANK[child] = curRank;
      }
      if(!visited.has(child)){
        visited.add(child);
        queue.push(child);
      }
    });
  }

  // Re-sort all columns with the now-complete rank map
  Object.values(cols).forEach(col => col.sort(colSort));

  // Re-assign y-positions
  nodes.forEach(nd => {
    const col = cols[depthOf[nd.id]];
    nd.y = MY + col.indexOf(nd) * ROW_GAP;
  });
  // Update origY snapshot to match new positions
  nodes.forEach(nd => { nd.origY = nd.y; });
})();

let activeId=null;
let lastSolidNodes=new Set();
let lastVarNodesAll=new Set();

// BFS strictly UPSTREAM: follows bwd edges only (toward roots).
// Returns set of node IDs that are ancestors of `id` (including `id`).
function upstreamSet(id){
  const visited=new Set([id]);
  const q=[id];
  while(q.length){
    const cur=q.shift();
    (bwd[cur]||[]).forEach(p=>{if(!visited.has(p)){visited.add(p);q.push(p);}});
  }
  return visited;
}

// BFS strictly DOWNSTREAM: follows fwd edges only (toward terminals).
// Returns set of node IDs that are descendants of `id` (including `id`).
function downstreamSet(id){
  const visited=new Set([id]);
  const q=[id];
  while(q.length){
    const cur=q.shift();
    (fwd[cur]||[]).forEach(c=>{if(!visited.has(c)){visited.add(c);q.push(c);}});
  }
  return visited;
}

// An edge s→t is on the highlighted path when it is internal to either
// the upstream sub-graph (s∈up AND t∈up) or the downstream sub-graph
// (s∈down AND t∈down).
//
// Why NOT  "s∈up AND t∈down":  that condition is only true for the single
// edge that crosses the selected node itself, leaving all other edges dim.
//
// The union of both sub-graphs gives exactly the set of edges on paths that
// run from any root → selected node → any terminal, without pulling in
// sibling branches that share a root but diverge before reaching the node.
function doHighlight(id){
  activeId=id;
  const up  = upstreamSet(id);
  const down= downstreamSet(id);
  const pathNodes=new Set([...up,...down]);

  const varEdgeKeys  = VARIABLE_EDGES.get(id) || new Set();
  const exclEdgeKeys = EXCLUDED_EDGES.get(id)  || new Set();

  // ── Build excluded node/edge sets ─────────────────────────────────────
  // Excluded edges and their full upstream paths are completely invisible.
  const exclEdgesAll = new Set();
  const exclNodesAll = new Set();

  exclEdgeKeys.forEach(key=>{
    const [es,et] = key.split('→');
    exclEdgesAll.add(key);
    exclNodesAll.add(es);
    // Walk upstream from es — but only follow nodes that are NOT also
    // on the normal solid path (to avoid hiding shared ancestors).
    const esAnc = upstreamSet(es);
    esAnc.forEach(nid => exclNodesAll.add(nid));
    edges.forEach(({s,t})=>{
      if(esAnc.has(s) && esAnc.has(t)) exclEdgesAll.add(s+'→'+t);
    });
  });

  // Literal exclusions: hide the specific edges and their TARGET nodes only.
  // NO upstream BFS — sources of excluded edges remain visible.
  const litExclKeys = EXCL_EDGES_LITERAL.get(id) || new Set();
  // Direct node exclusions (processed first so we know which nodes are excluded)
  const litExclNodes = EXCL_NODES_LITERAL.get(id) || new Set();
  litExclNodes.forEach(n=>{ exclNodesAll.add(n); });
  // Plexus nodes are never auto-excluded by edge logic; managed via EXCL_NODES_LITERAL only
  const PROTECTED_NODES = new Set(['plexSP','plexSA','plexCerv','plexBr',
    'trLumbAnt','trLumbPost','trLumbSacr','plexCocc']);
  litExclKeys.forEach(key=>{
    const [es2,et2] = key.split('→');
    exclEdgesAll.add(key);
    // Add target to exclNodesAll only if source is not excluded AND target is not a protected plexus node
    if(!exclNodesAll.has(es2) && !PROTECTED_NODES.has(et2)) exclNodesAll.add(et2);
  });

  // ── Build complete variable node/edge sets ─────────────────────────────
  const varEdgesAll = new Set();
  const varNodesAll = new Set();

  varEdgeKeys.forEach(key=>{
    const [vs,vt] = key.split('→');
    varEdgesAll.add(key);
    varNodesAll.add(vs);
    varNodesAll.add(vt);
    const srcAncestors = upstreamSet(vs);
    srcAncestors.forEach(nid => varNodesAll.add(nid));
    edges.forEach(({s,t})=>{
      if(srcAncestors.has(s) && srcAncestors.has(t))
        varEdgesAll.add(s+'→'+t);
    });
  });

  // Remove anything in the excluded set from variable sets
  exclEdgesAll.forEach(k => varEdgesAll.delete(k));
  exclNodesAll.forEach(n => varNodesAll.delete(n));

  // ── Build solid edge set ───────────────────────────────────────────────
  // Excluded and variable edges are both removed from solid consideration.
  const hlEdges = new Set();
  edges.forEach(({s,t})=>{
    const key = s+'→'+t;
    if(varEdgesAll.has(key)) return;
    if(exclEdgesAll.has(key)) return;
    if((up.has(s)&&up.has(t))||(down.has(s)&&down.has(t)))
      hlEdges.add(key);
  });

  // Remove solid edges whose TARGET is in exclNodesAll (single pass).
  hlEdges.forEach(key=>{
    const [s,t]=key.split('→');
    if(exclNodesAll.has(t)) hlEdges.delete(key);
  });

  // ── Solid nodes: derived from hlEdges ─────────────────────────────────
  const solidNodes = new Set();
  hlEdges.forEach(key=>{
    const [s,t]=key.split('→');
    solidNodes.add(s); solidNodes.add(t);
  });
  solidNodes.add(id);
  lastSolidNodes  = solidNodes;
  lastVarNodesAll = varNodesAll;

  // Clean up: remove excl/var nodes that ended up on solid path
  exclNodesAll.forEach(n=>{ if(solidNodes.has(n)) exclNodesAll.delete(n); });
  varNodesAll.forEach(n=>{  if(solidNodes.has(n)) varNodesAll.delete(n); });

  // All visible nodes = solid + variable (excluded nodes are invisible)
  const allVisible = new Set([...solidNodes, ...varNodesAll]);

  // ── Apply node styles ──
  nodeSel.each(function(d){
    const sel        = d3.select(this);
    const isSelected = d.id===id;
    const isSolid    = solidNodes.has(d.id);
    const isVar      = varNodesAll.has(d.id);
    const col        = HEX[d.type] || '#555';
    const rect       = sel.select('rect');

    sel.classed('dim',      !allVisible.has(d.id))
       .classed('hl',        isSelected)
       .classed('variable',  isVar && !isSolid);

    if(isSelected){
      rect.attr('fill',col).attr('fill-opacity',0.60)
          .attr('stroke',col).attr('stroke-opacity',1);
      sel.selectAll('text').attr('fill','#ffffff');
    } else {
      rect.attr('fill',col)
          .attr('fill-opacity',d.type==='root'?0.13:d.type==='terminal'?0.10:0.08)
          .attr('stroke',col)
          .attr('stroke-opacity',0.60);
      sel.selectAll('text').attr('fill',col);
    }
  });

  // ── Apply link styles ──
  linkSel.each(function(d){
    const key    = d.s+'→'+d.t;
    const inPath = hlEdges.has(key);
    const isVar  = varEdgesAll.has(key);
    d3.select(this)
      .classed('dim',      !inPath && !isVar)
      .classed('hl',        inPath && !isVar)
      .classed('variable',  isVar  && !inPath)
      .attr('stroke', '#9a9080');
  });
}

// For search we still want the full bidirectional expansion
function fullPathSet(id){
  const visited=new Set([id]);
  const q=[id];
  while(q.length){
    const cur=q.shift();
    (bwd[cur]||[]).forEach(p=>{if(!visited.has(p)){visited.add(p);q.push(p);}});
    (fwd[cur]||[]).forEach(c=>{if(!visited.has(c)){visited.add(c);q.push(c);}});
  }
  return visited;
}

const TYPE_LABEL={root:'Root',ramus:'Connecting nerve',plexus:'Plexus',
  trunk:'Plexus',nerve:'Connecting nerve',branch:'Connecting nerve',terminal:'Cutaneous innervation'};
const GROUP_LABEL={head:'Head/Neck',arm:'Upper limb',truncus:'Truncus',lowerbody:'Lower body'};

// ── ROOT ORIGIN HELPERS ──────────────────────────────────────────────────
function rootLabel(r){
  const m=r.label.match(/([CSV]\d*|Co|VII|X)$/);
  return m?m[1]:r.label.replace(/^N\. spinalis\s*/,'');
}
function rootAncestors(id){
  const roots=[];
  const visited=new Set();
  const q=[id];
  while(q.length){
    const cur=q.shift();
    if(visited.has(cur)) continue;
    visited.add(cur);
    const nd=nodeById[cur];
    if(nd && nd.type==='root') roots.push(nd);
    (bwd[cur]||[]).forEach(p=>{ if(!visited.has(p)) q.push(p); });
  }
  roots.sort((a,b)=>(ANAT_RANK[a.id]??9999)-(ANAT_RANK[b.id]??9999));
  return roots;
}

// ── SHARED INFO PANEL RENDERER ───────────────────────────────────────────
// context: 'pathway' → show "Anatomic View" button (jump to anat view)
//          'anatomic' → show "Pathway View" button (jump to pathway view)
function showInfoPanel(d, context){
  const allRoots = rootAncestors(d.id);
  const solidOrigin = allRoots
    .filter(r=>lastSolidNodes.has(r.id))
    .map(rootLabel);
  const varOrigin = allRoots
    .filter(r=>lastVarNodesAll.has(r.id))
    .map(rootLabel);
  const originParts = [
    ...solidOrigin,
    ...(varOrigin.length ? ['('+varOrigin.join(', ')+')'] : [])
  ];
  const origin = originParts.length ? originParts.join(', ') : '—';

  let html=`<h3>${d.fullLabel.replace(/\n/g,' ')}</h3>`;
  html+=`<span class="t-path"><b>Origin:</b> ${origin}${d.idx?' &nbsp;·&nbsp; Index '+d.idx:''}</span>`;
  tip.innerHTML=html;
  tipPanel.classList.add('visible');
  if(d.type==='terminal' && hasAnatPos(d.id)){
    if(context==='anatomic') addPathwayBtn(d.id);
    else addAnatBtn(d.id);
  } else {
    removeAnatBtn();
  }
}

// ═══════════════════════════════════════════════════════════════════════════
//  FILTER BUTTONS – hide unselected groups AND re-layout visible nodes
//  so they always start at the top of the screen (y = MY).
// ═══════════════════════════════════════════════════════════════════════════

function applyGroupFilter(g){
  clearHL();

  // ── 1. Determine which node-ids to keep ──────────────────────────────────
  let keep; // Set<id>
  if(g==='all'){
    keep = new Set(nodes.map(nd=>nd.id));
  } else {
    keep = new Set();
    nodes.forEach(nd=>{ if(nd.group===g) keep.add(nd.id); });
    // Include ALL ancestors so paths reach the spinal nerve roots
    let changed=true;
    while(changed){
      changed=false;
      edges.forEach(({s,t})=>{ if(keep.has(t)&&!keep.has(s)){keep.add(s);changed=true;} });
    }
  }

  // ── 2. Re-layout: assign fresh y-positions starting from MY ─────────────
  // Group visible nodes by their column (depthOf), keep same sort order,
  // but reset row numbering so the first row in each column is at y = MY.
  const visibleCols = {}; // depth → [node, ...]
  nodes.forEach(nd=>{
    if(!keep.has(nd.id)) return;
    const d = depthOf[nd.id];
    (visibleCols[d] = visibleCols[d]||[]).push(nd);
  });
  // Sort each column the same anatomical way as the original layout
  Object.values(visibleCols).forEach(col=>col.sort(colSort));
  // Assign new y; x (column) stays the same
  nodes.forEach(nd=>{
    if(!keep.has(nd.id)){ nd.y=nd.origY; return; } // doesn't matter, hidden
    const col=visibleCols[depthOf[nd.id]];
    nd.y = MY + col.indexOf(nd)*ROW_GAP;
  });

  // ── 3. Move node elements to new positions ───────────────────────────────
  nodeSel.each(function(d){
    const visible=keep.has(d.id);
    d3.select(this)
      .classed('hidden',!visible)
      .attr('transform',`translate(${d.x},${d.y})`);
  });

  // ── 4. Redraw link paths to match new node positions ─────────────────────
  linkSel.each(function(d){
    const visible=keep.has(d.s)&&keep.has(d.t);
    d3.select(this).classed('hidden',!visible);
    if(visible){
      const src=nodeById[d.s],tgt=nodeById[d.t];
      const x1=src.x+NW,y1=src.y+NH/2,x2=tgt.x,y2=tgt.y+NH/2,mx=(x1+x2)/2;
      d3.select(this).attr('d',`M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}`);
    }
  });

  // ── 5. Fit view to the re-laid-out content ───────────────────────────────
  setTimeout(fitVisible, 60);
}

  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    applyGroupFilter(btn.dataset.g);
  });
});

// Fit viewport tightly around visible (non-hidden) nodes
function fitVisible(){
  const vw=svgEl.clientWidth||1400, vh=svgEl.clientHeight||700;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  nodes.forEach(nd=>{
    // Check current datum y (already updated by applyGroupFilter)
    const el=nodeSel.filter(d=>d.id===nd.id);
    if(!el.empty()&&!el.classed('hidden')){
      minX=Math.min(minX,nd.x);   minY=Math.min(minY,nd.y);
      maxX=Math.max(maxX,nd.x+NW); maxY=Math.max(maxY,nd.y+NH);
    }
  });
  if(minX===Infinity){fitAll();return;}
  const padX=60, padY=50;
  const cw=maxX-minX+2*padX, ch=maxY-minY+2*padY;
  // Always fit to full width; top-align
  const sc = (vw - 2 * padX) / (maxX - minX);
  const ox = padX - minX * sc;
  const oy = padY - minY * sc;  // top-align with small padding
  svg.transition().duration(350).call(zoom.transform,
    d3.zoomIdentity.translate(ox, oy).scale(sc));
}

  // Anterior left arm:
  //   medial (ulnar) strip: x 290–400, lateral (radial) strip: x 400–470
  //   upper arm y 39–570, forearm y 570–760, hand y 760–980
  // Posterior right arm:
  //   medial strip x 1055–1130, lateral strip x 1130–1250
  //   upper arm y 39–600, forearm/hand y 600–980
  // Territories: anterior arm x=260-510, posterior x=980-1350
  // Vertical: overarm/underarm split at y≈530(ant)/480(post), wrist y≈750/700
  const TERRITORIES = {
    // Anterior medial (ulnar side): x 260-382
    't18_1': [[260,0],[382,0],[382,530],[260,530]],
    't17_1': [[260,530],[382,530],[382,750],[260,750]],
    't16_1': [[260,750],[382,750],[382,860],[260,860]],
    't16_2': [[260,860],[382,860],[382,1024],[260,1024]],
    // Anterior lateral (radial side): x 382-510
    't13_2': [[382,0],[510,0],[510,300],[382,300]],
    't13_3': [[382,300],[510,300],[510,530],[382,530]],
    't11_1': [[382,530],[510,530],[510,750],[382,750]],
    't14_1': [[382,750],[510,750],[510,860],[382,860]],
    't14_2': [[382,860],[510,860],[510,1024],[382,1024]],
    // Posterior medial (ulnar side): x 980-1152
    't10_1': [[980,0],[1152,0],[1152,240],[980,240]],
    't12_1': [[980,240],[1152,240],[1152,480],[980,480]],
    't15_1': [[980,480],[1152,480],[1152,640],[980,640]],
    't16_3': [[980,640],[1152,640],[1152,1024],[980,1024]],
    // Posterior lateral (radial side): x 1152-1350
    't13_1': [[1152,0],[1350,0],[1350,480],[1152,480]],
    't13_4': [[1152,480],[1350,480],[1350,1024],[1152,1024]],
  };

  // Node positions: NODE_POS is now module-scope (see top of script)
  // x = anchor point (dot position), y = centre
  // Anterior: nodes left of arm, labels extend leftward (rx = x - NW)
  // Posterior: nodes right of arm, labels extend rightward (rx = x)

  const svg = d3.select(container).append('svg')
    .attr('width', W).attr('height', H)
    .attr('viewBox', `0 0 ${W} ${H}`)
    .style('width','100%').style('height','100%')
    .style('cursor','grab');

  // Define group BEFORE zoom handler references it
  const anatG = svg.append('g');

  // Explicit extent avoids reading SVG baseVal (which is unreliable for % sizing)
  const anatZoom = d3.zoom()
    .scaleExtent([0.1, 8])
    .extent([[0, 0], [W, H]])
    .on('zoom', (event)=>{ anatG.attr('transform', event.transform); });
  svg.call(anatZoom);
  window._anatZoom = anatZoom;
  window._anatSvg  = svg;

  // Fit full diagram into container
  const sc0 = Math.min(W/VW, H/VH) * 0.92;
  const tx0 = (W - VW*sc0) / 2;
  const ty0 = (H - VH*sc0) / 2;
  svg.call(anatZoom.transform, d3.zoomIdentity.translate(tx0, ty0).scale(sc0));

  const s = anatG;

  // Background
  s.append('rect').attr('width',VW+200).attr('height',VH+200)
    .attr('x',-100).attr('y',-100).attr('fill','var(--bg)');

  // ClipPaths for arm boundaries
  const defs = svg.append('defs');

  // Left arm (anterior) boundary polygon
  const leftArmPts = '260,0 510,0 510,1024 260,1024';
  defs.append('clipPath').attr('id','clip-left-arm')
    .append('polygon').attr('points', leftArmPts);

  // Right arm (posterior) boundary polygon
  const rightArmPts = '980,0 1350,0 1350,1024 980,1024';
  defs.append('clipPath').attr('id','clip-right-arm')
    .append('polygon').attr('points', rightArmPts);

  // Territory overlays (behind outline, clipped to arm boundary)
  Object.entries(TERRITORIES).forEach(([id, pts])=>{
    if(!nodeById[id]) return;
    const col = ANAT_COLORS[id] || '#888';
    const pointStr = pts.map(p=>p.join(',')).join(' ');
    const isAnt = pts[0][0] < VW/2;
    s.append('polygon').attr('points', pointStr)
      .attr('fill', col).attr('fill-opacity', 0.28)
      .attr('stroke', col).attr('stroke-width', 0.5)
      .attr('clip-path', isAnt ? 'url(#clip-left-arm)' : 'url(#clip-right-arm)')
      .style('cursor','pointer')
      .on('click', ()=>{
        const nd = nodeById[id];
        if(nd){ switchView('pathway'); setTimeout(()=>{ applyGroupFilter('arm'); zoomToNode(nd); },150); }
      });
  });

  // Arm outline SVG on top of territories
  // Anterior arm outline (left)
  s.append('image').attr('href', ARM_ANT_SRC)
    .attr('x', 192).attr('y', 0)
    .attr('width', 384).attr('height', VH)
    .attr('preserveAspectRatio','xMidYMid meet');
  // Posterior arm outline (right)
  s.append('image').attr('href', ARM_POST_SRC)
    .attr('x', 940).attr('y', 0)
    .attr('width', 423).attr('height', VH)
    .attr('preserveAspectRatio','xMidYMid meet');

  // View labels
  // Title labels — 18px screen size, positioned above arms
  const titleFs = (18/sc0).toFixed(1)+'px';
  const titleY = (-8/sc0).toFixed(1);
    s.append('text').attr('x',384).attr('y', titleY)
    .attr('text-anchor','middle').attr('class','anat-view-label')
    .attr('font-size', titleFs).attr('fill','#2a2018').text('Anterior');
    s.append('text').attr('x',1152).attr('y', titleY)
    .attr('text-anchor','middle').attr('class','anat-view-label')
    .attr('font-size', titleFs).attr('fill','#2a2018').text('Posterior');

  // Nodes — NW=188, NH=40 exactly like pathway view
  Object.entries(NODE_POS).forEach(([id, pos])=>{
    if(!nodeById[id]) return;
    const nd = nodeById[id];
    const col = ANAT_COLORS[id] || HEX[nd.type] || '#888';
    const isAnt = pos.x < VW/2;
    const rx = isAnt ? pos.x - NW : pos.x;
    const ry = pos.y - NH/2;

    const g = s.append('g').attr('class','anat-node')
      .style('cursor','pointer')
      .each(function(){ this.__anatId = nd.id; })
      .on('click', (event)=>{
        event.stopPropagation();
        // Highlight the clicked node in anatomic view + show info panel
        anatSetActive(nd.id);
        doHighlight(nd.id);
        showInfoPanel(nd, 'anatomic');
      });

    g.append('rect').attr('x',rx).attr('y',ry)
      .attr('width',NW).attr('height',NH).attr('rx',4)
      .attr('fill',col).attr('fill-opacity',0.15)
      .attr('stroke',col).attr('stroke-width',2);

    // Identical font logic to pathway view — same values, same behaviour
    const rawLen = nd.label.replace(/\n/g,' ').length;
    const baseFs = nd.type===TYPE.root ? 11 : 9.8;
    const dynFs = rawLen < 14 ? Math.min(baseFs + 1.5, 12) : baseFs;
    const fs = dynFs.toFixed(1)+'px';
    const fw = '400';
    const lineH = dynFs > 9 ? 12 : 10;
    const lines = wrapLabel(nd.label);
    const totalTH = lines.length * lineH;
    const sy = ry + NH/2 - totalTH/2 + lineH*0.5;
    lines.forEach((line,i)=>{
      g.append('text')
        .attr('x', rx+NW/2).attr('y', sy+i*lineH)
        .attr('text-anchor','middle').attr('dominant-baseline','middle')
        .attr('font-size', fs).attr('font-weight', fw)
        .attr('fill', col).attr('pointer-events','none')
        .style('font-family',"'Source Code Pro',monospace")
        .text(line);
    });
    g.append('title').text(nd.fullLabel.replace(/\n/g,' '));
  });

  // If a node was requested for focus (via "Anatomic View" button), zoom to it
  if(window._anatFocusId){
    const focusId = window._anatFocusId;
    window._anatFocusId = null;
    requestAnimationFrame(()=>{ zoomAnatToNode(focusId); });
  }
}

// ── View toggle logic ─────────────────────────────────────────────────────
const graphEl   = document.getElementById('graph');
const anatEl    = document.getElementById('anat-view');
const vtPathway = document.getElementById('vt-pathway');
const vtAnatomy = document.getElementById('vt-anatomic');

function switchView(mode){
  const legendRow = document.getElementById('legend-row');
  if(mode === 'anatomic'){
    graphEl.style.display = 'none';
    anatEl.classList.add('active');
    vtPathway.classList.remove('on');
    vtAnatomy.classList.add('on');
    if(legendRow) legendRow.classList.add('hidden');
    // Use rAF so container has real dimensions before building
    const armNodes = nodes.filter(n=>n.group==='arm' && n.type==='terminal');
    requestAnimationFrame(()=>{ buildAnatView(armNodes); });
  } else {
    graphEl.style.display = '';
    anatEl.classList.remove('active');
    vtPathway.classList.add('on');
    vtAnatomy.classList.remove('on');
    if(legendRow) legendRow.classList.remove('hidden');
  }
}

vtPathway.addEventListener('click', ()=>{ clearHL(); switchView('pathway'); });
vtAnatomy.addEventListener('click', ()=>{ clearHL(); switchView('anatomic'); });
// Mobile view toggle mirrors
const vtPathM = document.getElementById('vt-pathway-m');
const vtAnatM = document.getElementById('vt-anatomic-m');
if(vtPathM) vtPathM.addEventListener('click', ()=>{ switchView('pathway'); vtPathM.classList.add('on'); vtAnatM.classList.remove('on'); });
if(vtAnatM) vtAnatM.addEventListener('click', ()=>{ switchView('anatomic'); vtAnatM.classList.add('on'); vtPathM.classList.remove('on'); });

// ── INFO PANEL ANATOMIC VIEW BUTTON ─────────────────────────────────────
const tipEl = document.getElementById('tip');

// NODE_POS ids that have an anatomic position defined
function hasAnatPos(id){ return id in NODE_POS; }

function addAnatBtn(id){
  removeAnatBtn();
  const btn = document.createElement('button');
  btn.id='tip-anat-btn'; btn.textContent='Anatomic View';
  btn.addEventListener('click', ()=>{
    // Remember which node to focus once anatomic view has been built
    window._anatFocusId = id;
    // Switch to anatomic view (also mirrors mobile toggle state)
    switchView('anatomic');
    const vtAnatM2 = document.getElementById('vt-anatomic-m');
    const vtPathM2 = document.getElementById('vt-pathway-m');
    if(vtAnatM2){ vtAnatM2.classList.add('on'); }
    if(vtPathM2){ vtPathM2.classList.remove('on'); }
    // Re-render the info panel in anatomic context so the button now
    // reads "Pathway View" and the node is marked active in anat view.
    const nd = nodes.find(n=>n.id===id);
    if(nd){
      requestAnimationFrame(()=>{
        anatSetActive(id);
        showInfoPanel(nd, 'anatomic');
      });
    }
  });
  document.getElementById('tip-inner').appendChild(btn);
}

// Button shown when the info panel is opened from anatomic view → jump to pathway
function addPathwayBtn(id){
  removeAnatBtn();
  const btn = document.createElement('button');
  btn.id='tip-anat-btn'; btn.textContent='Pathway View';
  btn.addEventListener('click', ()=>{
    const nd = nodes.find(n=>n.id===id);
    switchView('pathway');
    const vtAnatM2 = document.getElementById('vt-anatomic-m');
    const vtPathM2 = document.getElementById('vt-pathway-m');
    if(vtPathM2){ vtPathM2.classList.add('on'); }
    if(vtAnatM2){ vtAnatM2.classList.remove('on'); }
    // Activate the nerve in pathway view (switches region, highlights, zooms,
    // and re-renders the info panel in pathway context → "Anatomic View" button)
    if(nd) setTimeout(()=>{ zoomToNode(nd); }, 150);
  });
  document.getElementById('tip-inner').appendChild(btn);
}

// Zoom anatomic view to a given node id (called after buildAnatView completes)
function zoomAnatToNode(id){
  const pos = NODE_POS[id];
  if(!pos || !window._anatZoom || !window._anatSvg) return;
  const cont = document.getElementById('anat-view');
  const W = cont.clientWidth  || 1536;
  const H = cont.clientHeight || 900;
  const sc = Math.min(W/VW, H/VH)*0.92;
  const scale = Math.min(sc*2.4, 3.2);
  const tx = W/2 - pos.x*scale - (NW*scale)/2;
  const ty = H/2 - pos.y*scale - (NH*scale)/2;
  window._anatSvg.transition().duration(450).call(
    window._anatZoom.transform,
    d3.zoomIdentity.translate(tx,ty).scale(scale)
  );
}

// Highlight the active node within anatomic view (visual feedback)
function anatSetActive(id){
  if(!window._anatSvg) return;
  window._anatSvg.selectAll('.anat-node').classed('anat-active', false);
  window._anatSvg.selectAll('.anat-node')
    .filter(function(){ return this.__anatId === id; })
    .classed('anat-active', true);
}

function removeAnatBtn(){
  const existing = document.getElementById('tip-anat-btn');
  if(existing) existing.remove();
}

// ── SEARCH WITH DROPDOWN ─────────────────────────────────────────────────
const searchEl   = document.getElementById('search');
const searchClear= document.getElementById('search-clear');
const searchDD   = document.getElementById('search-dropdown');
let   ddActive   = -1; // keyboard navigation index

function closeDropdown(){
  searchDD.classList.remove('open');
  searchDD.innerHTML='';
  ddActive=-1;
}

function zoomToNode(nd){
  // Switch to the node's region if current filter doesn't show it
  const currentBtn = document.querySelector('.fb.on');
  const currentG = currentBtn ? currentBtn.dataset.g : null;
  if(nd.group && currentG !== nd.group){
    // Find the correct filter button and activate it
    const targetBtn = document.querySelector(`.fb[data-g="${nd.group}"]`);
    if(targetBtn){
      document.querySelectorAll('.fb').forEach(b=>b.classList.remove('on'));
      targetBtn.classList.add('on');
      applyGroupFilter(targetBtn.dataset.g);
    }
  }
  // Activate highlight
  doHighlight(nd.id);
  // Show info panel (pathway context → "Anatomic View" button)
  showInfoPanel(nd, 'pathway');
  activeId=nd.id;
  // Zoom: pan to node centre
  const vw=svgEl.clientWidth||1400, vh=svgEl.clientHeight||700;
  const scale=2.2;
  const tx=vw/2 - nd.x*scale - (NW*scale)/2;
  const ty=vh/2 - nd.y*scale - (NH*scale)/2;
  svg.transition().duration(380).call(
    zoom.transform,
    d3.zoomIdentity.translate(tx,ty).scale(scale)
  );
}

function buildDropdown(q){
  searchDD.innerHTML='';
  ddActive=-1;
  if(q.length < 4){ closeDropdown(); return; }
  const ql=q.toLowerCase();
  const hits=nodes.filter(nd=>
    nd.fullLabel.toLowerCase().includes(ql) ||
    nd.label.toLowerCase().includes(ql) ||
    (nd.idx && nd.idx.toLowerCase().includes(ql))
  ).slice(0,20);

  if(!hits.length){
    searchDD.innerHTML='<div id="sd-empty">No matches found</div>';
    searchDD.classList.add('open'); return;
  }
  hits.forEach((nd,i)=>{
    const div=document.createElement('div');
    div.className='sd-item';
    const name=nd.fullLabel.replace(/\n/g,' ');
    div.innerHTML=name;
    div.addEventListener('mousedown', e=>{
      e.preventDefault();
      searchEl.value='';
      searchClear.style.display='none';
      closeDropdown();
      clearHL();
      zoomToNode(nd);
    });
    searchDD.appendChild(div);
  });
  searchDD.classList.add('open');
}

searchEl.addEventListener('input', function(){
  searchClear.style.display = this.value ? 'block' : 'none';
  buildDropdown(this.value.trim());
});

searchEl.addEventListener('keydown', function(e){
  const items=searchDD.querySelectorAll('.sd-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){
    e.preventDefault();
    ddActive=Math.min(ddActive+1,items.length-1);
    items.forEach((el,i)=>el.classList.toggle('active',i===ddActive));
    items[ddActive]?.scrollIntoView({block:'nearest'});
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    ddActive=Math.max(ddActive-1,0);
    items.forEach((el,i)=>el.classList.toggle('active',i===ddActive));
    items[ddActive]?.scrollIntoView({block:'nearest'});
  } else if(e.key==='Enter'){
    e.preventDefault();
    const active=ddActive>=0?items[ddActive]:items[0];
    if(active) active.dispatchEvent(new MouseEvent('mousedown'));
  } else if(e.key==='Escape'){
    closeDropdown(); this.blur();
  }
});

searchEl.addEventListener('blur', ()=>setTimeout(closeDropdown, 150));

searchClear.addEventListener('click', function(){
  searchEl.value='';
  searchClear.style.display='none';
  closeDropdown();
  clearHL();
  searchEl.focus();
});

// ── ZOOM BUTTONS ─────────────────────────────────────────────────────────────
document.getElementById('z-in').onclick=()=>{
  if(anatEl.classList.contains('active') && window._anatSvg && window._anatZoom)
    window._anatSvg.transition().duration(220).call(window._anatZoom.scaleBy,1.4);
  else svg.transition().duration(220).call(zoom.scaleBy,1.4);
};
document.getElementById('z-out').onclick=()=>{
  if(anatEl.classList.contains('active') && window._anatSvg && window._anatZoom)
    window._anatSvg.transition().duration(220).call(window._anatZoom.scaleBy,0.72);
  else svg.transition().duration(220).call(zoom.scaleBy,0.72);
};
document.getElementById('z-fit').onclick=()=>{
  if(anatEl.classList.contains('active') && window._anatSvg && window._anatZoom){
    const c=document.getElementById('anat-view');
    const W=c.clientWidth||900, H=c.clientHeight||600;
    const sc=Math.min(W/VW,H/VH)*0.92;
    window._anatSvg.transition().duration(300).call(
      window._anatZoom.transform, d3.zoomIdentity.translate((W-VW*sc)/2,(H-VH*sc)/2).scale(sc));
  } else fitVisible();
};
window.addEventListener('resize',()=>{
  setTimeout(fitVisible, 100);
});
document.getElementById('info-btn').addEventListener('click',()=>{
  document.getElementById('info-splash').classList.add('visible');
});
</script>
